<!DOCTYPE html>
<html>
<head>
    <title>Sports Tracker</title>
</head>
<body> 
    <form action="/" method="GET">
        <input type="text" name="player_name" placeholder="Search for a player...">
        <button type="submit">Search</button>
    </form>


    <h1>{{ player }}</h1>
    <p>{{ team }}</p>
    <p>{{ sport }}</p>
    <p>{{ position }}</p>
</body>
</html>
